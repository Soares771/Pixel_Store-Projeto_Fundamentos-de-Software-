<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pixel Store — Login</title>

  <!-- CSS -->
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/login.css" />
</head>
<body>

  <div class="login-wrapper">
    <div class="login-card page-enter">

      <!-- Logo -->
      <div class="login-logo">
        <span class="logo-icon">🎮</span>
        <div class="logo-title grad-text">PIXEL STORE</div>
        <div class="logo-subtitle">Games &amp; Mais</div>
      </div>

      <!-- Mensagem de erro -->
      <div id="login-error" class="login-error" role="alert"></div>

      <!-- Formulário -->
      <form id="login-form" novalidate>

        <div class="form-group">
          <label for="email">E-mail</label>
          <input
            id="email"
            type="email"
            placeholder="seu@email.com"
            autocomplete="email"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Senha</label>
          <input
            id="password"
            type="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
        </div>

        <button id="login-btn" type="submit" class="btn-primary login-btn">
          ENTRAR
        </button>

        <button id="open-register-btn" type="button" class="btn-register">
          REGISTRAR
        </button>

      </form>

      <!-- Dica de acesso -->
      <div class="login-hint">
        <strong>Credenciais de teste</strong>
        jogador@email.com &nbsp;/&nbsp; 123456<br/>
        teste@email.com &nbsp;/&nbsp; senha123<br/>
        carlos@email.com &nbsp;/&nbsp; carlos321
      </div>

    </div>
  </div>

  <!-- Modal de Registro -->
  <div id="register-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-card page-enter">

      <div class="modal-header">
        <h2 id="modal-title" class="modal-title grad-text">CRIAR CONTA</h2>
        <button id="close-register-btn" class="modal-close" aria-label="Fechar">&times;</button>
      </div>

      <div id="register-error" class="login-error" role="alert"></div>

      <form id="register-form" novalidate>

        <div class="form-group">
          <label for="reg-name">Nome</label>
          <input id="reg-name" type="text" placeholder="Seu nome" autocomplete="name" required />
        </div>

        <div class="form-group">
          <label for="reg-email">E-mail</label>
          <input id="reg-email" type="email" placeholder="seu@email.com" autocomplete="email" required />
        </div>

        <div class="form-group">
          <label for="reg-password">Senha</label>
          <input id="reg-password" type="password" placeholder="Minimo 6 caracteres" autocomplete="new-password" required />
        </div>

        <div class="form-group">
          <label for="reg-confirm">Confirmar Senha</label>
          <input id="reg-confirm" type="password" placeholder="Repita a senha" autocomplete="new-password" required />
        </div>

        <button id="register-btn" type="submit" class="btn-primary login-btn">
          CRIAR CONTA
        </button>

      </form>

    </div>
  </div>

  <!-- Toast global -->
  <div id="toast"></div>

  <!-- JS: dados → auth → login controller -->
  <script src="../js/data/users.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/login.js"></script>

</body>
</html>
